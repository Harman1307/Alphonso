# Mango Config :D

#Gaps
gappih=6
gappiv=6
gappoh=8
gappov=8

#Borders
borderpx=1
border_radius=16
no_border_when_single=1
no_radius_when_single=0

#Opacity
focused_opacity=1.0
unfocused_opacity=0.85

#Colors
rootcolor=0x000000ff
bordercolor=0x6b6969ff
focuscolor=0x9ba7bfff
urgentcolor=0xce928dff
scratchpadcolor=0x9ba7bfff
globalcolor=0x9ba7bfff
overlaycolor=0x8dcea0ff
maximizescreencolor=0xcec18dff

#Blur
blur=1
blur_layer=1
blur_optimized=0
blur_params_num_passes=3
blur_params_radius=10
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

#Shadows
shadows=1
layer_shadows=1
shadow_only_floating=1
shadows_size=18
shadows_blur=15
shadows_position_x=0
shadows_position_y=6
shadowscolor=0x00000040

animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1

zoom_initial_ratio=0.97
zoom_end_ratio=1.0
fadein_begin_opacity=0.0
fadeout_begin_opacity=1.0

animation_duration_open=480
animation_duration_close=300
animation_duration_move=420
animation_duration_tag=720
animation_duration_focus=240

animation_curve_open=0.16,1.0,0.3,1.0
animation_curve_close=0.4,0.0,0.2,1.0
animation_curve_move=0.2,1.0,0.3,1.0
animation_curve_tag=0.18,1.0,0.3,1.0
animation_curve_focus=0.4,0.0,0.2,1.0
animation_curve_opafadein=0.16,1.0,0.3,1.0
animation_curve_opafadeout=0.4,0.0,0.6,1.0

#Layout
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=0
circle_layout=tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller,vertical_grid,vertical_deck,right_tile,tgmix,dwindle,canvas

#Scroller
scroller_structs=20
scroller_default_proportion=1.0
scroller_focus_center=1
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,1.0

# Dwindle
dwindle_smart_split=0
dwindle_preserve_split=1
dwindle_vsplit=1               
dwindle_hsplit=1              
dwindle_smart_resize=1

# Canvas
canvas_tiling=0                  
canvas_pan_on_kill=1

#Overview
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

#Focus
xwayland_persistence=1
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=1
snap_distance=30
drag_tile_to_tile=1

#Input
repeat_rate=50
repeat_delay=300
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=0
trackpad_natural_scrolling=0
disable_while_typing=1
cursor_theme=capitaine-cursors
cursor_size=16
cursor_hide_timeout=3
xkb_rules_options=caps:escape

#Binds
bind=SUPER,Return,spawn,kitty
bind=SUPER+SHIFT,Return,spawn,kitty --class floatterm
bind=SUPER,d,spawn,touch /tmp/qs-launcher-toggle
bind=SUPER,w,spawn,touch /tmp/qs-wallpaper-toggle
bind=SUPER+SHIFT,w,spawn,~/.config/scripts/random-wallpaper.sh
bind=SUPER,e,spawn,thunar
bind=SUPER+SHIFT,q,killclient
bind=SUPER+SHIFT,space,togglefloating
bind=SUPER,f,togglefullscreen
bind=SUPER,x,spawn,touch ~/.cache/qs/lock

bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,prev

bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

bind=SUPER+CTRL,Left,resizewin,-20,0
bind=SUPER+CTRL,Right,resizewin,20,0
bind=SUPER+CTRL,Up,resizewin,0,-20
bind=SUPER+CTRL,Down,resizewin,0,20
bind=SUPER+CTRL,h,resizewin,-20,0
bind=SUPER+CTRL,l,resizewin,20,0
bind=SUPER+CTRL,k,resizewin,0,-20
bind=SUPER+CTRL,j,resizewin,0,20

bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5

gesturebind=none,left,3,viewtoleft_have_client
gesturebind=none,right,3,viewtoright_have_client
gesturebind=none,up,3,toggleoverview
gesturebind=none,down,3,toggleoverview

bind=SUPER,space,switch_layout
bind=SUPER,t,setlayout,dwindle
bind=SUPER+SHIFT,t,setlayout,tile
bind=SUPER,c,setlayout,canvas
bind=SUPER,s,setlayout,scroller
bind=SUPER,v,setoption,tag_animation_direction,0
bind=SUPER+SHIFT,v,setoption,tag_animation_direction,1
bind=SUPER,o,toggleoverview
bind=SUPER,g,togglegaps
bind=SUPER+SHIFT,g,toggleglobal
bind=SUPER,bracketleft,setmfact,-0.05
bind=SUPER,bracketright,setmfact,+0.05
bind=SUPER+SHIFT,s,switch_proportion_preset

bind=SUPER,m,toggleminimap,
bind=SUPER,p,canvas_overview_toggle,
bind=SUPER,bracketleft,canvas_zoom_resize,0.7
bind=SUPER,bracketright,canvas_zoom_resize,1.3
bind=SUPER,u,canvas_fill_viewport,
bind=SUPER+SHIFT,c,canvas_centerview,

bind=NONE,Print,spawn_shell,grim ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot" "Screen captured"
bind=SHIFT,Print,spawn_shell,grim -g "$(slurp)" ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot" "Area captured"
bind=SUPER,r,spawn_shell,gpu-screen-recorder -w screen -f 30 -a default_output -o ~/screen-recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4 & notify-send "Recording" "Started"
bind=SUPER+SHIFT,r,spawn_shell,killall -SIGINT gpu-screen-recorder && notify-send "Recording" "Saved"

bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05-
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.05+
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

bind=SUPER+CTRL,r,reload_config
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

#Window Rules
windowrule=isfloating:1,width:700,height:400,appid:floatterm
windowrule=isfloating:1,width:700,height:400,appid:mpv 
monitorrule=name:^eDP-1$,width:1920,height:1200,refresh:60,x:0,y:0,scale:1.25

#Autostart
exec-once=awww-daemon
exec-once=quickshell
exec-once=mpd-mpris
exec-once=kdeconnect-indicator
exec-once=swayidle -w timeout 180 'brightnessctl -s set 5%' timeout 240 'echo 1 > ~/.cache/qs/lock' timeout 300 'wlr-randr --output eDP-1 --off' resume 'wlr-randr --output eDP-1 --on; sleep 0.5; brightnessctl -r' before-sleep 'echo 1 > ~/.cache/qs/lock'
